<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu&display=swap" rel="stylesheet">

<title>Heart Interaction</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(145deg,#f9eef2 0%,#f8e4ea 100%);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:"Gaegu",sans-serif;
}

.loading-content{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
}

/* container */

.rings-container{
position:relative;
width:120px;
height:120px;
display:flex;
align-items:center;
justify-content:center;
}

/* hidden checkbox */

#heart-toggle{
display:none;
}

/* heart */

.core-heart{
width:40px;
height:40px;
background:#ca5675;
transform:rotate(45deg);
position:relative;
cursor:pointer;
z-index:10;

box-shadow:0 0 25px #F1BBC9,0 0 50px #f8a5b9;

animation:heart-beat 1.8s infinite ease-in-out;
}

.core-heart::before,
.core-heart::after{
content:"";
position:absolute;
width:40px;
height:40px;
border-radius:50%;
background:#ca5675;
}

.core-heart::before{
left:-20px;
top:0;
}

.core-heart::after{
top:-20px;
left:0;
}

/* ripple rings */

.ring{
position:absolute;
border-radius:50%;
border:2.5px solid rgba(241,187,201,0.65);
width:64px;
height:64px;
opacity:0;

box-shadow:0 0 20px #F1BBC9,inset 0 0 10px #ffd0db;
}

.ring-1{
animation:ripple 2.4s ease-out infinite;
}

.ring-2{
animation:ripple 2.4s ease-out infinite .8s;
}

.ring-3{
animation:ripple 2.4s ease-out infinite 1.6s;
}

/* popup text */

.popup-text{
position:absolute;
top:180px;
font-size:2.4rem;
color:#ca5675;
opacity:0;
transform:translateY(10px);
transition:.4s;
text-shadow:0 0 10px #F1BBC9;
white-space: nowrap;
}

/* click trigger */

#heart-toggle:checked ~ .popup-text{
opacity:1;
transform:translateY(0);
}

/* loading text */

.loading-text{
font-size:1.8rem;
letter-spacing:2px;
background:linear-gradient(135deg,#F1BBC9,#d494a8);
-webkit-background-clip:text;
background-clip:text;
color:transparent;

animation:text-float 2.8s infinite alternate ease-in-out;
}

/* animations */

@keyframes ripple{

0%{
width:32px;
height:32px;
opacity:.9;
}

80%{
width:208px;
height:208px;
opacity:.2;
}

100%{
width:220px;
height:220px;
opacity:0;
}

}

@keyframes heart-beat{

0%{
transform:rotate(45deg) scale(.95);
}

50%{
transform:rotate(45deg) scale(1.1);
}

100%{
transform:rotate(45deg) scale(.95);
}

}

@keyframes text-float{

0%{
transform:translateY(0);
opacity:.8;
}

100%{
transform:translateY(-6px);
opacity:1;
}

}

</style>
</head>

<body>

<div class="loading-content">

<div class="rings-container">

<input type="checkbox" id="heart-toggle">

<label for="heart-toggle" class="core-heart"></label>

<div class="popup-text">You are loved ♡</div>

<div class="ring ring-1"></div>
<div class="ring ring-2"></div>
<div class="ring ring-3"></div>

</div>

<div class="loading-text">Love is timing</div>

</div>

</body>
</html>
